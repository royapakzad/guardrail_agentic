# Mirrors mozilla-ai/any-llm's hook set (see issue #4).
# Run locally with: uv run pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
        args: ["--assume-in-merge"]
      - id: check-toml
      - id: check-yaml
      # File-hygiene hooks apply to code/config-of-record only — not the
      # generated outputs/, the scenario data/, or the prompt config/ text.
      - id: end-of-file-fixer
        exclude: ^(outputs|data|config)/
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^(outputs|data|config)/
      - id: trailing-whitespace
        exclude: ^(outputs|data|config)/|\.md$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.12"
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: "uv run mypy agentic_guardrails"
        args: []
        require_serial: true
        language: system
        types: [python]
        pass_filenames: false
        verbose: true

  - repo: https://github.com/codespell-project/codespell
    rev: "v2.4.2"
    hooks:
      - id: codespell
        args: ["--ignore-words-list=ist,fo,nin"]
        exclude: (uv\.lock|data/|outputs/|config/)
